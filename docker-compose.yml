services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - SAT_DB_PATH=/app/data/sat_academy.sqlite3
      - LM_STUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
